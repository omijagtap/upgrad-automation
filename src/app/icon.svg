<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Solid black background filling the entire favicon canvas for absolute clarity in Chrome tabs -->
  <rect width="32" height="32" fill="#000000" />
  
  <!-- Solid exact brand red uG text - flat, ultra-bold, no gradients, no borders -->
  <text 
    x="50%" 
    y="55%" 
    dominant-baseline="middle" 
    text-anchor="middle" 
    font-family="system-ui, -apple-system, BlinkMacSystemFont, sans-serif" 
    font-weight="900" 
    font-size="15" 
    fill="#F23E36"
    letter-spacing="-0.04em"
  >uG</text>
</svg>
